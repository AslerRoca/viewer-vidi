<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#89b4fa"/>
      <stop offset="100%" stop-color="#cba6f7"/>
    </linearGradient>
    <linearGradient id="g2" x1="20%" y1="0%" x2="80%" y2="100%">
      <stop offset="0%"   stop-color="#cdd6f4"/>
      <stop offset="100%" stop-color="#89b4fa"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background rounded square -->
  <rect width="128" height="128" rx="24" fill="#181825"/>

  <!-- Subtle inner vignette -->
  <rect width="128" height="128" rx="24" fill="url(#g1)" opacity="0.04"/>

  <!-- Eye shape (almond / vesica) -->
  <path d="M12 64 C36 28, 92 28, 116 64 C92 100, 36 100, 12 64 Z"
        fill="none" stroke="url(#g1)" stroke-width="3" filter="url(#glow)"/>

  <!-- Iris ring -->
  <circle cx="64" cy="64" r="22"
          fill="none" stroke="url(#g1)" stroke-width="3.5" filter="url(#glow)"/>

  <!-- Pupil -->
  <circle cx="64" cy="64" r="10" fill="url(#g2)"/>

  <!-- Specular highlight on pupil -->
  <circle cx="59" cy="59" r="3" fill="white" opacity="0.30"/>

  <!-- MPR crosshair ticks (outside iris, inside eye) -->
  <line x1="64" y1="37" x2="64" y2="46" stroke="#89b4fa" stroke-width="2"   stroke-linecap="round" opacity="0.75"/>
  <line x1="64" y1="82" x2="64" y2="91" stroke="#89b4fa" stroke-width="2"   stroke-linecap="round" opacity="0.75"/>
  <line x1="37" y1="64" x2="46" y2="64" stroke="#89b4fa" stroke-width="2"   stroke-linecap="round" opacity="0.75"/>
  <line x1="82" y1="64" x2="91" y2="64" stroke="#89b4fa" stroke-width="2"   stroke-linecap="round" opacity="0.75"/>
</svg>
